name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install formatter tools
        run: |
          go install golang.org/x/tools/cmd/goimports@v0.43.0
          go install github.com/segmentio/golines@v0.13.0
          go install mvdan.cc/gofumpt@v0.9.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Format
        run: make fmt

      - name: Verify formatting
        run: git diff --exit-code

      - name: Test
        run: make test

      - name: Build
        run: make build

  redis-integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CANTO_TEST_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Redis integration tests
        run: make test-redis
